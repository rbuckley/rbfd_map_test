<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=4, user-scalable=yes">
<meta name="theme-color" content="#16213e">
<title>RBFD D1 Map Test - Interactive</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title" id="districtTitle"><h1>RBFD Map Test - District 1</h1></div>
    <div class="score">Score: <b id="score">0/0</b> (<span id="pct">--</span>)</div>
    <div class="controls">
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="explore">Explore</button>
        <button class="mode-tab" data-mode="test">Test</button>
        <button class="mode-tab" data-mode="blocks">Blocks</button>
      </div>
      <div class="test-toggles" id="testToggles" style="display:none;">
        <div class="mode-tabs" id="selectionTabs">
          <button class="mode-tab active" data-selection="random">Random</button>
          <button class="mode-tab" data-selection="click">Click</button>
        </div>
        <div class="mode-tabs" id="answerTabs">
          <button class="mode-tab active" data-answer="dropdown">Dropdown</button>
          <button class="mode-tab" data-answer="type">Type</button>
        </div>
      </div>
      <div class="test-toggles" id="blocksToggles" style="display:none;">
        <div class="mode-tabs" id="blockStyleTabs">
          <button class="mode-tab active" data-blockstyle="locate">Locate</button>
          <button class="mode-tab" data-blockstyle="identify">Identify</button>
        </div>
      </div>
      <button class="btn primary" id="newQ">New</button>
      <button class="btn" id="reveal">Reveal</button>
      <button class="btn" id="missed">Retry Missed</button>
      <button class="btn" id="resetView">Reset Zoom</button>
      <button class="btn" id="rotateBtn">⟳ Rotate</button>
      <div class="maps-menu-wrap">
        <button class="btn" id="mapsMenuBtn">🗺 Maps ▾</button>
        <div class="maps-menu" id="mapsMenu" style="display:none;">
          <button class="menu-item" id="newDistrictBtn">＋ Add map</button>
          <button class="menu-item" id="editDistrictBtn">✎ Edit</button>
          <button class="menu-item" id="examModeBtn">🎓 Exam mode</button>
          <button class="menu-item" id="deleteDistrictBtn" style="display:none;">🗑 Delete</button>
          <button class="menu-item" id="exportMapBtn">⤓ Export this map</button>
          <button class="menu-item" id="exportAllBtn">⤓ Export all</button>
          <label class="menu-item" id="importAllBtn">⤒ Import<input id="importAllInput" type="file" accept="application/json,.json" hidden></label>
        </div>
      </div>
    </div>
  </div>
  <div class="map-wrap">
    <div style="padding:24px;color:var(--dim)">Loading map…</div>
  </div>
  <div class="bottom">
    <div class="prompt" id="prompt">Tap a street to see its name. Pinch or scroll to zoom. Drag to pan.</div>
    <div class="input-row" id="inputRow" style="display:none;">
      <select id="dropdown" style="display:none;"></select>
      <input id="textbox" type="text" autocomplete="off" autocorrect="off" autocapitalize="words" placeholder="Type the street name" style="display:none;"/>
      <button class="btn primary" id="submitAns">Check</button>
      <button class="btn" id="skip">Skip</button>
      <button id="excludeBtn">Exclude</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="rename-row" id="renameRow" style="display:none;">
      <span class="rename-label" id="renameLabel">Rename</span>
      <input id="renameInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="words" placeholder="Corrected street name"/>
      <button class="btn primary" id="renameSave">Save</button>
      <button class="btn" id="mergeWithBtn">Merge with…</button>
      <button class="btn" id="unmergeBtn" style="display:none;">Unmerge</button>
      <button class="btn" id="excludeToggleBtn" title="Exclude this street from quizzes and exams">Exclude</button>
      <button class="btn" id="renameCancel">Cancel</button>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <button id="exclusionToggle">Manage Exclusions (0)</button>
      <button id="renameToggle">✎ Edit street names</button>
    </div>
    <div id="exclusionManager"></div>
    <div id="renameManager"></div>
    <div class="legend">
      <span><i class="swatch"></i>Street</span>
      <span><i class="swatch target"></i>Asked street</span>
      <span><i class="swatch green"></i>Correct</span>
      <span><i class="swatch red"></i>Wrong</span>
    </div>
  </div>

  <!-- Certification exam: setup card, running chrome, results card (hidden until launched). -->
  <div class="exam-overlay" id="examSetup" style="display:none;">
    <div class="exam-card">
      <h2>🎓 Certification Exam</h2>
      <p class="exam-sub" id="examSetupDistrict"></p>
      <label class="exam-field">Examinee name<input id="examName" type="text" autocomplete="off" autocapitalize="words"></label>
      <label class="exam-field">Badge / ID<input id="examBadge" type="text" autocomplete="off"></label>
      <div class="exam-field">Coverage<div class="mode-tabs" id="examCoverage"></div></div>
      <label class="exam-field">Pass threshold (%)<input id="examPass" type="number" min="1" max="100" value="90"></label>
      <div class="exam-actions">
        <button class="btn primary" id="examStart" disabled>Start exam</button>
        <button class="btn" id="examCancel">Cancel</button>
      </div>
      <p class="exam-note">Proctored: the map locks to this district and gives no feedback until the exam ends.</p>
    </div>
  </div>

  <div class="exam-bar" id="examBar" style="display:none;">
    <span class="exam-progress" id="examProgress"></span>
    <span class="exam-locate" id="examLocate"></span>
  </div>
  <div class="exam-panel" id="examPanel" style="display:none;">
    <button class="btn primary" id="examSubmit" disabled>Submit answer</button>
    <button class="btn" id="examDontKnow">Don't know</button>
    <span style="flex:1"></span>
    <button class="btn" id="examEnd">End exam</button>
  </div>

  <div class="exam-overlay" id="examResults" style="display:none;">
    <div class="exam-card">
      <h2 id="examResultTitle">Result</h2>
      <div id="examResultBody"></div>
      <div class="exam-actions"><button class="btn primary" id="examDone">Done</button></div>
    </div>
  </div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
